<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>ICD-10 Code Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 20px;\n            background-color: #f4f4f4;\n        }\n        input[type="text"] {\n            padding: 10px;\n            width: 100%;\n            max-width: 400px;\n            margin-bottom: 10px;\n            border: 1px solid #ccc;\n            border-radius: 4px;\n        }\n        button {\n            padding: 10px;\n            background-color: #28a745;\n            color: white;\n            border: none;\n            border-radius: 4px;\n            cursor: pointer;\n        }\n        button:hover {\n            background-color: #218838;\n        }\n        #result {\n            margin-top: 20px;\n        }\n    </style>\n</head>\n<body>\n    <h1>ICD-10 Code Generator</h1>\n    <input type="text" id="inputField" placeholder="Enter condition...">\n    <button onclick="generateCode()">Generate ICD-10 Code</button>\n    <div id="result"></div>\n\n    <script>\n        function generateCode() {\n            const input = document.getElementById('inputField').value;\n            // Placeholder for code generation logic\n            // In a real application, this would make a request to a backend service\n            document.getElementById('result').innerText = `Generated ICD-10 code for '${input}': [Code]`;\n        }\n    </script>\n</body>\n</html>
